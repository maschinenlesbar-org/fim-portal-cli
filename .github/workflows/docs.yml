name: Docs

# Builds the TypeDoc API docs for the client library and deploys them to GitHub
# Pages. Publishes on every new version tag so the docs site reflects the latest
# release; also runnable manually.
#
# One-time repo setting: Settings -> Pages -> Build and deployment -> Source ->
# "GitHub Actions".
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Least privilege at the workflow level: only read. The Pages/OIDC write scopes
# are granted per-job, to the deploy job that actually needs them.
permissions:
  contents: read

# Allow one in-flight Pages deployment at a time; don't cancel a running one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false

      - name: Use Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 22.x
          # No cache restoration on tag-triggered runs (cache-poisoning hardening).
          package-manager-cache: false

      - name: Install
        run: npm ci

      - name: Build docs
        run: npm run docs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Scopes the Pages deploy needs, granted only to this job.
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
